name: Build & Release Desktop App

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Linux 系统依赖（Tauri 需要）
      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # 设置 Python 环境（带 pip 缓存）
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      # 安装 Python 依赖
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Build backend on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: backend\build.bat

      - name: Build backend on non-Windows
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x backend/build.sh
          ./backend/build.sh

      # 设置 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.33.0'

      # 设置 Node 环境
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: BillNote_frontend
        run: pnpm install --frozen-lockfile

      # 设置 Rust 环境
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      # Cargo 缓存
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            BillNote_frontend/src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('BillNote_frontend/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clean stale Tauri bundle artifacts
        shell: bash
        run: rm -rf BillNote_frontend/src-tauri/target/release/bundle

      # Linux 上的 AppImage 构建目前会卡在 tauri/linuxdeploy，
      # 先稳定产出 deb/rpm，避免整条发布流水线被上游问题拖挂。
      - name: Build Tauri App on Linux
        if: runner.os == 'Linux'
        working-directory: BillNote_frontend
        run: pnpm desktop:build:ci:linux

      # Windows 上的 WiX MSI 链接阶段目前不稳定，
      # CI 只保留更稳定的 NSIS 安装包产物。
      - name: Build Tauri App on Windows
        if: runner.os == 'Windows'
        working-directory: BillNote_frontend
        run: pnpm desktop:build:ci:windows

      - name: Build Tauri App on macOS
        if: runner.os == 'macOS'
        working-directory: BillNote_frontend
        run: pnpm desktop:build:ci

      # 收集产物到统一目录
      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          BUNDLE_DIR="BillNote_frontend/src-tauri/target/release/bundle"

          case "$RUNNER_OS" in
            macOS)
              ARTIFACT_PATTERNS=("*.dmg")
              ;;
            Linux)
              ARTIFACT_PATTERNS=("*.deb" "*.rpm")
              ;;
            Windows)
              ARTIFACT_PATTERNS=("nsis/*.exe")
              ;;
            *)
              echo "Unsupported runner OS: $RUNNER_OS" >&2
              exit 1
              ;;
          esac

          FOUND_ARTIFACTS=0
          for pattern in "${ARTIFACT_PATTERNS[@]}"; do
            while IFS= read -r artifact; do
              cp "$artifact" release-artifacts/
              FOUND_ARTIFACTS=$((FOUND_ARTIFACTS + 1))
            done < <(find "$BUNDLE_DIR" -path "$BUNDLE_DIR/$pattern" -type f)
          done

          if ! [[ "$FOUND_ARTIFACTS" -gt 0 ]]; then
            echo "No release artifacts found for $RUNNER_OS in $BUNDLE_DIR" >&2
            exit 1
          fi

          echo "=== Collected artifacts ==="
          ls -lh release-artifacts/

      # 生成 SHA256 校验和
      - name: Generate checksums
        shell: bash
        run: |
          cd release-artifacts
          CHECKSUM_FILE="SHA256SUMS-${{ matrix.platform }}.txt"
          if command -v sha256sum >/dev/null 2>&1; then
            CHECKSUM_COMMAND=(sha256sum)
          else
            CHECKSUM_COMMAND=(shasum -a 256)
          fi
          "${CHECKSUM_COMMAND[@]}" * > "$CHECKSUM_FILE"
          cat "$CHECKSUM_FILE"

      # 上传产物（供 release job 使用）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.platform }}
          path: release-artifacts/
          retention-days: 7

  # 创建 GitHub Release 并上传所有产物
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 下载所有平台的构建产物
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: List all artifacts
        run: |
          echo "=== All release artifacts ==="
          ls -lhR all-artifacts/

      - name: Verify downloaded release artifacts
        shell: bash
        run: |
          set -euo pipefail
          for checksum in \
            SHA256SUMS-macos-latest.txt \
            SHA256SUMS-ubuntu-22.04.txt \
            SHA256SUMS-windows-latest.txt
          do
            if [[ ! -s "all-artifacts/$checksum" ]]; then
              echo "Missing checksum file: $checksum" >&2
              exit 1
            fi
          done
          find all-artifacts -type f ! -name 'SHA256SUMS-*.txt' | grep -q .
          cd all-artifacts
          for checksum in SHA256SUMS-*.txt; do
            sha256sum -c "$checksum"
          done

      # 创建 Release 并上传产物
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 雨滴笔记助手 ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: all-artifacts/*
